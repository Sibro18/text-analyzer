services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_app
    ports:
      - "8000:8000"
    depends_on:
      - worker
    volumes:
      - ./files:/app/files
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL
      - CELERY_RESULT_BACKEND

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: celery_worker
    depends_on:
      - redis
    volumes:
      - ./files:/app/files
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL
      - CELERY_RESULT_BACKEND


  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
